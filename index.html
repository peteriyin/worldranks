<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/output.css" />
    <script defer src="app.js"></script>
    <link
      rel="icon"
      href="resources/earth.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <title>WorldRanks</title>
  </head>
  <body class="bg-[#1B1D1F]">
    <div class="w-screen relative flex justify-center">
      <img
        src="resources/hero-image-sm.jpg"
        alt="background image"
        class="w-screen h-80 object-cover object-center"
      />
      <div
        class="absolute left-[50%] top-[15%] transform -translate-x-1/2 -translate-y-1/2"
      >
        <img src="resources/Logo.svg" alt="world rank logo" />
      </div>

      <div
        class="w-[90%] absolute bg-[#1B1D1F] border border-[#6C727F] border-solid top-[50%] rounded-lg flex justify-center shadow-2xl"
      >
        <div class="w-[95%]">
          <div class="text-[#D2D5DA]">Found x countries</div>
          <form action="#" method="post">
            <div class="relative">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                class="absolute left-[12%] top-1/2 transform -translate-y-1/2"
              >
                <circle
                  cx="11"
                  cy="11"
                  r="7"
                  stroke="#6C727F"
                  stroke-width="2"
                />
                <path
                  d="M20 20L17 17"
                  stroke="#6C727F"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>
              <input
                type="search"
                id="search"
                name="q"
                placeholder="Search by Name, Region, Subregion"
                class="bg-[#282B30] w-full text-[#D2D5DA] p-2 rounded-xl overflow-hidden text-ellipsis whitespace-nowrap focus:outline-none pl-17 pr-16 placeholder:text-[#D2D5DA] text-center"
              />
            </div>

            <div class="relative">
              <div>Sort by</div>
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                class="absolute top-[55%] right-[5%]"
              >
                <path d="M12 6L8 10L4 6" stroke="#6C727F" stroke-width="3" />
              </svg>
              <select
                name="select"
                id="select"
                class="w-full p-2 border-2 border-[#6C727F] rounded-xl cursor-pointer appearance-none bg-[#1B1D1F] focus:outline-none"
              >
                <option value="population">Population</option>
                <option value="name">Name</option>
                <option value="region">Region</option>
                <option value="subregion">Subregion</option>
              </select>
            </div>

            <div>
              <p>Region</p>
              <button
                onclick="this.classList.toggle('button-background')"
                type="button"
              >
                Antarctic
              </button>
              <button
                onclick="this.classList.toggle('button-background')"
                type="button"
              >
                Americas
              </button>
              <button
                onclick="this.classList.toggle('button-background')"
                type="button"
              >
                Asia
              </button>
              <button
                onclick="this.classList.toggle('button-background')"
                type="button"
              >
                Africa
              </button>
              <button
                onclick="this.classList.toggle('button-background')"
                type="button"
              >
                Europe
              </button>
              <button
                onclick="this.classList.toggle('button-background')"
                type="button"
              >
                Oceania
              </button>
            </div>

            <div>
              <div>Status</div>
              <div>
                <label>
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    class="absolute"
                  >
                    <path
                      d="M5 14L8.23309 16.4248C8.66178 16.7463 9.26772 16.6728 9.60705 16.2581L18 6"
                      stroke="#D2D5DA"
                      stroke-width="2"
                      stroke-linecap="round"
                    />
                  </svg>

                  <input
                    type="checkbox"
                    id="united_nations"
                    name="status"
                    value="united_nations"
                  />
                  Member of the United Nations
                </label>
              </div>

              <div>
                <label>
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    class="absolute"
                  >
                    <path
                      d="M5 14L8.23309 16.4248C8.66178 16.7463 9.26772 16.6728 9.60705 16.2581L18 6"
                      stroke="#D2D5DA"
                      stroke-width="2"
                      stroke-linecap="round"
                    />
                  </svg>

                  <input
                    type="checkbox"
                    name="status"
                    id="independent"
                    value="independent"
                  />
                  Independent State
                </label>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
