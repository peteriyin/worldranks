<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/output.css" />
    <script defer src="app.js"></script>
    <link
      rel="icon"
      href="resources/worldranks.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    <title>WorldRanks</title>
  </head>
  <body class="bg-[#1B1D1F] relative">
    <div>
      <img
        src="resources/hero-image-sm.jpg"
        alt="background image"
        class="w-screen h-80 object-cover object-center"
      />
    </div>
    <div
      class="absolute left-[50%] top-12.5 transform -translate-x-1/2 -translate-y-1/2"
    >
      <img src="resources/Logo.svg" alt="world rank logo" />
    </div>

    <div
      class="w-[90%] absolute mb-7 top-37.5 left-[5%] bg-[#1B1D1F] border-[1.5px] border-[#282B30] border-solid rounded-lg shadow-2xl pl-2.5 pr-2.5 pb-2.5 space-y-6 pt-3"
    >
      <div class="text-[#D2D5DA] font-medium text-[1rem]" id="countrystatus">
        Found <span id="country-count"></span>
        <span id="country-spell-check"></span>
      </div>
      <div class="relative">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="absolute left-[2%] top-1/2 transform -translate-y-1/2"
        >
          <circle cx="11" cy="11" r="7" stroke="#D2D5DA" stroke-width="2" />
          <path
            d="M20 20L17 17"
            stroke="#D2D5DA"
            stroke-width="3"
            stroke-linecap="round"
          />
        </svg>
        <input
          type="search"
          id="search"
          name="q"
          placeholder="Search by Name, Region, Subregion"
          class="bg-[#282B30] w-full text-[#D2D5DA] p-2 rounded-xl overflow-hidden text-ellipsis whitespace-nowrap focus:outline-none pl-19 pr-19 placeholder:text-[#D2D5DA] text-[0.75rem] font-normal"
        />
      </div>

      <div class="relative">
        <div class="label-size mb-3">Sort by</div>
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="absolute top-[60%] right-[5%]"
        >
          <path d="M12 6L8 10L4 6" stroke="#6C727F" stroke-width="3" />
        </svg>
        <select
          name="select"
          id="select"
          class="w-full p-2 border-2 border-[#282B30] rounded-xl cursor-pointer appearance-none bg-[#1B1D1F] focus:outline-none label-data"
        >
          <option value="population">Population</option>
          <option value="name">Name</option>
          <option value="region">Region</option>
          <option value="subregion">Subregion</option>
        </select>
      </div>

      <div>
        <div class="label-size mb-3">Region</div>
        <div class="flex flex-wrap gap-1.5">
          <div>
            <button
              onclick="this.classList.toggle('button-background')"
              type="button"
              value="antarctic"
            >
              Antarctic
            </button>
          </div>
          <div>
            <button
              onclick="this.classList.toggle('button-background')"
              type="button"
              value="americas"
            >
              Americas
            </button>
          </div>
          <div>
            <button
              onclick="this.classList.toggle('button-background')"
              type="button"
              value="asia"
            >
              Asia
            </button>
          </div>
          <div>
            <button
              onclick="this.classList.toggle('button-background')"
              type="button"
              value="africa"
            >
              Africa
            </button>
          </div>
          <div>
            <button
              onclick="this.classList.toggle('button-background')"
              type="button"
              value="europe"
            >
              Europe
            </button>
          </div>
          <div>
            <button
              onclick="this.classList.toggle('button-background')"
              type="button"
              value="oceania"
            >
              Oceania
            </button>
          </div>
        </div>
      </div>

      <div>
        <div class="label-size mb-3">Status</div>
        <div class="label-data mb-4 flex gap-2.5">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="absolute"
          >
            <path
              d="M5 14L8.23309 16.4248C8.66178 16.7463 9.26772 16.6728 9.60705 16.2581L18 6"
              stroke="#D2D5DA"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>

          <input
            type="checkbox"
            id="united_nations"
            name="status"
            value="united_nations"
          />
          <label for="united_nations"> Member of the United Nations</label>
        </div>

        <div class="label-data mb-4 flex gap-2.5">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="absolute"
          >
            <path
              d="M5 14L8.23309 16.4248C8.66178 16.7463 9.26772 16.6728 9.60705 16.2581L18 6"
              stroke="#D2D5DA"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>

          <input
            type="checkbox"
            name="status"
            id="independent_state"
            value="independent"
          />
          <label for="independent_state">Independent</label>
        </div>
      </div>

      <div class="overflow-auto" id="tableData"></div>
    </div>
  </body>
</html>
